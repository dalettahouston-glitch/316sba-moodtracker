<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Mood Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Daily Mood Tracker</h1>

    <!-- Live Date + Time -->
    <p id="current-date" class="time-display"></p>
    <p id="current-time" class="time-display"></p>

   
    <div class="form-section">

      <label for="mood">Mood</label>
      <select id="mood" required>
        <option value="">Select mood</option>
        <option>😊 Happy</option>
        <option>😢 Sad</option>
        <option>🤩 Excited</option>
        <option>😡 Angry</option>
        <option>😌 Calm</option>
      </select>

      <label for="note">Note</label>
      <input type="text" id="note" placeholder="Write a short note" required minlength="3">

      <button id="addMoodBtn" class="add-btn">Add Mood</button>

      <p id="error" class="error">Please fill out all fields correctly.</p>

      <button id="motivationBtn" class="motivation-btn">Show Motivation</button>
      <p id="motivationMessage" class="motivation-text"></p>
    </div>

   
    <div id="moodList" class="mood-list"></div>


    <template id="moodTemplate">
      <div class="mood-entry">
        <h3 class="mood-text"></h3>
        <p class="note-text"></p>
        <p class="time-text"></p>
        <button class="delete-btn">Delete</button>
      </div>
    </template>

  </div>

  <script src="script.js"></script>
</body>
</html>
